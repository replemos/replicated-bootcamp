global:
  # Required when proxying Bitnami images through a non-official registry
  security:
    allowInsecureImages: true

# Container image for the app (and migration init container)
image:
  repository: images.emosbaugh.be/proxy/playball-exe/docker.io/replemos/playball.exe
  tag: main
  pullPolicy: Always

replicaCount: 1

# Pull secret for images.emosbaugh.be proxy registry (license ID as user/password)
imagePullSecrets: []

# Resource requests and limits for the main app container
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

# Resource requests and limits for init containers (migrate, seed)
initContainers:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

service:
  # ClusterIP | LoadBalancer | NodePort
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ""
  hostname: ""
  # tls:
  #   - secretName: playball-exe-tls
  #     hosts:
  #       - playball.example.com
  tls: []

# Set postgresql.enabled=false and provide externalDatabase.url to use your own PostgreSQL
postgresql:
  enabled: true
  image:
    registry: images.emosbaugh.be
    repository: proxy/playball-exe/registry-1.docker.io/bitnami/postgresql
  auth:
    database: baseball
    username: baseball
    # Override this in production!
    password: baseball
  primary:
    persistence:
      size: 1Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi

# Only used when postgresql.enabled=false
externalDatabase:
  url: ""

# Set redis.enabled=false and provide externalRedis.url to use your own Redis
redis:
  enabled: true
  image:
    registry: images.emosbaugh.be
    repository: proxy/playball-exe/registry-1.docker.io/bitnami/redis
  auth:
    enabled: false
  master:
    persistence:
      enabled: false

# Only used when redis.enabled=false
externalRedis:
  url: ""

nextauth:
  # Required: generate with: openssl rand -base64 32
  secret: ""
  url: "http://localhost:3000"

# Replicated SDK sidecar — provides licensing and telemetry APIs
# nameOverride controls the Deployment/Service name (set to hide Replicated branding)
sdk:
  enabled: true
  nameOverride: playball-exe-sdk
  image:
    registry: images.emosbaugh.be
    repository: proxy/playball-exe/docker.io/replicated/replicated-sdk
