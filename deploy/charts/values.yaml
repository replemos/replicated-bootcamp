global:
  # Required when proxying Bitnami images through a non-official registry
  security:
    allowInsecureImages: true
  # Propagates to all subcharts (postgresql, redis, replicated sdk)
  imagePullSecrets:
    - name: enterprise-pull-secret

# Container image for the app (and migration init container)
image:
  registry: images.emosbaugh.be/proxy/playball-exe/docker.io
  repository: replemosteam/playball.exe
  tag: main
  pullPolicy: Always

# Replicated SDK — provides licensing and telemetry APIs
replicated:
  enabled: true
  nameOverride: playball-exe-sdk
  image:
    registry: images.emosbaugh.be

replicaCount: 1

app:
  enabled: true

# Pull secret created automatically by the Replicated SDK at install time
imagePullSecrets:
  - name: enterprise-pull-secret

# Resource requests and limits for the main app container
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

# Resource requests and limits for init containers (migrate, seed)
initContainers:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

service:
  # ClusterIP | LoadBalancer | NodePort
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ""
  hostname: ""
  # tls:
  #   - secretName: playball-exe-tls
  #     hosts:
  #       - playball.example.com
  tls: []

# Set postgresql.enabled=false and provide externalDatabase.url to use your own PostgreSQL
postgresql:
  enabled: true
  image:
    registry: images.emosbaugh.be/proxy/playball-exe/registry-1.docker.io
  auth:
    database: baseball
    username: baseball
    # Override this in production!
    password: baseball
  primary:
    persistence:
      size: 1Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi

# Only used when postgresql.enabled=false
externalDatabase:
  url: ""

# Set redis.enabled=false and provide externalRedis.url to use your own Redis
redis:
  enabled: true
  image:
    registry: images.emosbaugh.be/proxy/playball-exe/registry-1.docker.io
  auth:
    enabled: false
  master:
    persistence:
      enabled: false

# Only used when redis.enabled=false
externalRedis:
  url: ""

nextauth:
  # Required: generate with: openssl rand -base64 32
  secret: ""
  url: "http://localhost:3000"

certManager:
  enabled: true
  # self_signed | lets_encrypt | lets_encrypt_dns01 | manual
  mode: self_signed
  acme:
    email: ""
    dns01:
      route53:
        hostedZoneId: ""
        accessKeyId: ""
        secretAccessKey: ""
  manual:
    cert: ""  # base64-encoded PEM certificate
    key: ""   # base64-encoded PEM private key

# AI Commentary — set by KOTS config when ai_commentary_enabled license field is true
aiCommentary:
  provider: ""
  openaiApiKey: ""
  anthropicApiKey: ""
