apiVersion: v1
kind: Secret
metadata:
  name: {{ include "playball-exe.fullname" . }}-support-bundle
  labels:
    {{- include "playball-exe.labels" . | nindent 4 }}
    troubleshoot.sh/kind: support-bundle
stringData:
  support-bundle-spec: |
    apiVersion: troubleshoot.sh/v1beta2
    kind: SupportBundle
    metadata:
      name: {{ include "playball-exe.fullname" . }}
    spec:
      collectors:
        - logs:
            name: app
            namespace: {{ .Release.Namespace }}
            selector:
              - app.kubernetes.io/name=playball-exe
            limits:
              maxAge: "720h"
              maxLines: 10000
        - logs:
            name: postgres
            namespace: {{ .Release.Namespace }}
            selector:
              - app.kubernetes.io/name=postgresql
              - app.kubernetes.io/instance={{ .Release.Name }}
            limits:
              maxAge: "720h"
              maxLines: 10000
        - logs:
            name: redis
            namespace: {{ .Release.Namespace }}
            selector:
              - app.kubernetes.io/name=redis
              - app.kubernetes.io/instance={{ .Release.Name }}
            limits:
              maxAge: "720h"
              maxLines: 10000
        - logs:
            name: sdk
            namespace: {{ .Release.Namespace }}
            selector:
              - app.kubernetes.io/name={{ .Values.replicated.nameOverride | default "replicated" }}
              - app.kubernetes.io/instance={{ .Release.Name }}
            limits:
              maxAge: "720h"
              maxLines: 10000
      analyzers:
        - textAnalyze:
            checkName: "License Expiry Warning"
            fileName: app/**/*.log
            regex: '\[license\] warning: expires in \d+ days'
            outcomes:
              - fail:
                  when: "true"
                  message: >-
                    Your license expires within 7 days. Renew it before expiry
                    to avoid service interruption: https://vendor.replicated.com
              - pass:
                  when: "false"
                  message: "License expiry is not within 7 days."
