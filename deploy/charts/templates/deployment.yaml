apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "playball-exe.fullname" . }}
  labels:
    {{- include "playball-exe.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "playball-exe.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "playball-exe.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-db
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - node
            - -e
            - |
              const net = require('net');
              const u = new URL(process.env.DATABASE_URL);
              const host = u.hostname, port = parseInt(u.port || '5432');
              (function check() {
                const s = net.createConnection(port, host);
                s.on('connect', () => { console.log('DB ready'); s.end(); process.exit(0); });
                s.on('error', () => { console.log('Waiting for DB...'); setTimeout(check, 2000); });
              })();
          envFrom:
            - secretRef:
                name: {{ include "playball-exe.fullname" . }}
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - node
            - node_modules/prisma/build/index.js
            - migrate
            - deploy
          envFrom:
            - secretRef:
                name: {{ include "playball-exe.fullname" . }}
          resources:
            {{- toYaml .Values.initContainers.resources | nindent 12 }}
        - name: seed
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - node
            - prisma/seed.js
          envFrom:
            - secretRef:
                name: {{ include "playball-exe.fullname" . }}
          resources:
            {{- toYaml .Values.initContainers.resources | nindent 12 }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "playball-exe.fullname" . }}
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
