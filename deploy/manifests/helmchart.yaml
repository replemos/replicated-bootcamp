apiVersion: kots.io/v1beta2
kind: HelmChart
metadata:
  name: playball-exe
spec:
  chart:
    name: playball-exe
    chartVersion: 0.1.0
  releaseName: playball-exe
  helmUpgradeFlags:
    - --timeout
    - 10m
  builder:
    nextauth:
      secret: placeholder
  values:
    image:
      registry: 'repl{{ ReplicatedImageRegistry (HelmValue ".image.registry") }}'
    replicated:
      image:
        registry: 'repl{{ ReplicatedImageRegistry (HelmValue ".replicated.image.registry") }}'
    postgresql:
      enabled: repl{{ ConfigOptionEquals "postgresql_enabled" "1" }}
      image:
        registry: 'repl{{ ReplicatedImageRegistry (HelmValue ".postgresql.image.registry") }}'
    externalDatabase:
      url: 'repl{{ ConfigOption "external_postgres_url" }}'
    redis:
      enabled: repl{{ ConfigOptionEquals "redis_enabled" "1" }}
      image:
        registry: 'repl{{ ReplicatedImageRegistry (HelmValue ".redis.image.registry") }}'
      replica:
        replicaCount: 1
    externalRedis:
      url: 'repl{{ ConfigOption "external_redis_url" }}'
    nextauth:
      secret: 'repl{{ ConfigOption "nextauth_secret" }}'
      url: 'repl{{ print "https://" (or (ConfigOption "hostname") "localhost") }}'
    ingress:
      enabled: true
      className: traefik
      hostname: 'repl{{ ConfigOption "hostname" }}'
    aiCommentary:
      provider: 'repl{{ ConfigOption "ai_provider" }}'
      openaiApiKey: 'repl{{ ConfigOption "openai_api_key" }}'
      anthropicApiKey: 'repl{{ ConfigOption "anthropic_api_key" }}'
    certManager:
      enabled: true
      mode: 'repl{{ ConfigOption "tls_mode" }}'
      acme:
        email: 'repl{{ ConfigOption "acme_email" }}'
        dns01:
          route53:
            hostedZoneId: 'repl{{ ConfigOption "route53_hosted_zone_id" }}'
            accessKeyId: 'repl{{ ConfigOption "route53_access_key_id" }}'
            secretAccessKey: 'repl{{ ConfigOption "route53_secret_access_key" }}'
      manual:
        cert: 'repl{{ ConfigOption "tls_cert" }}'
        key: 'repl{{ ConfigOption "tls_key" }}'
