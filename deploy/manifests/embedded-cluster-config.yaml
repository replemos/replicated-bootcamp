apiVersion: embeddedcluster.replicated.com/v1beta1
kind: Config
metadata:
  name: playball-exe
spec:
  version: "3.0.0-alpha-31+k8s-1.34"
  domains:
    proxyRegistryDomain: images.emosbaugh.be
  extensions:
    helmCharts:
      - chart:
          name: cert-manager
          chartVersion: "v1.17.2"
        releaseName: cert-manager
        namespace: cert-manager
        weight: 10
        values:
          imageRegistry: '{{repl ReplicatedImageRegistry "quay.io" }}'
          image:
            repository: '{{repl ReplicatedImageRepository "jetstack/cert-manager-controller" }}'
          cainjector:
            image:
              repository: '{{repl ReplicatedImageRepository "jetstack/cert-manager-cainjector" }}'
          webhook:
            image:
              repository: '{{repl ReplicatedImageRepository "jetstack/cert-manager-webhook" }}'
          startupapicheck:
            image:
              repository: '{{repl ReplicatedImageRepository "jetstack/cert-manager-startupapicheck" }}'
          crds:
            enabled: true
      - chart:
          name: traefik
          chartVersion: "39.0.7"
        releaseName: traefik
        namespace: traefik
        values:
          image:
            registry: '{{repl ReplicatedImageRegistry "docker.io" }}'
            repository: '{{repl ReplicatedImageRepository "library/traefik" }}'
          service:
            type: NodePort
          ports:
            web:
              port: 8000
              expose:
                default: true
              exposedPort: 80
              nodePort: 80
              http:
                redirections:
                  entryPoint:
                    to: websecure
                    scheme: https
                    permanent: true
            websecure:
              port: 8443
              expose:
                default: true
              exposedPort: 443
              nodePort: 443
