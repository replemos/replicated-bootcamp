apiVersion: kots.io/v1beta1
kind: Config
metadata:
  name: playball-exe
spec:
  groups:
    - name: database
      title: Database
      items:
        - name: postgresql_enabled
          title: Use Bundled PostgreSQL
          help_text: "When enabled, a PostgreSQL instance is deployed inside the cluster. Disable to connect to an external database you manage."
          type: bool
          default: "1"
        - name: postgresql_password
          title: PostgreSQL Password
          help_text: "Password for the bundled PostgreSQL instance. Generated automatically on first install; changing this after initial deployment requires a manual database password update."
          type: password
          hidden: true
          readonly: false
          value: '{{repl RandomString 32}}'
          when: '{{repl ConfigOptionEquals "postgresql_enabled" "1"}}'
        - name: external_postgres_url
          title: External PostgreSQL URL
          help_text: "PostgreSQL connection string, e.g. postgres://user:pass@host:5432/dbname"
          type: password
          when: '{{repl ConfigOptionEquals "postgresql_enabled" "0"}}'
          validation:
            regex:
              pattern: "^postgres(ql)?://[^[:space:]]+"
              message: "Must be a valid PostgreSQL connection string (e.g. postgres://user:pass@host:5432/dbname)"

    - name: redis_config
      title: Redis
      items:
        - name: redis_enabled
          title: Use Bundled Redis
          help_text: "When enabled, a Redis instance is deployed inside the cluster. Disable to connect to an external Redis server you manage."
          type: bool
          default: "1"
        - name: redis_password
          title: Redis Password
          help_text: "Password for the bundled Redis instance. Generated automatically on first install; changing this after initial deployment requires a manual Redis password update."
          type: password
          hidden: true
          readonly: false
          value: '{{repl RandomString 32}}'
          when: '{{repl ConfigOptionEquals "redis_enabled" "1"}}'
        - name: external_redis_url
          title: External Redis URL
          help_text: "Redis connection string, e.g. redis://host:6379"
          type: password
          when: '{{repl ConfigOptionEquals "redis_enabled" "0"}}'
          validation:
            regex:
              pattern: "^redis(s)?://[^[:space:]]+"
              message: "Must be a valid Redis connection string (e.g. redis://host:6379)"

    - name: ingress
      title: Ingress
      items:
        - name: hostname
          title: Hostname
          help_text: "Hostname for the app, e.g. playball.example.com. Required when using Let's Encrypt. Leave blank to accept traffic on any hostname."
          type: text
        - name: tls_mode
          title: TLS Certificate Mode
          type: select_one
          default: self_signed
          items:
            - name: self_signed
              title: Automatic - Self-Signed
            - name: lets_encrypt
              title: Automatic - Let's Encrypt (HTTP-01)
            - name: lets_encrypt_dns01
              title: Automatic - Let's Encrypt (DNS-01 / Route 53)
            - name: manual
              title: Manual Upload
        - name: acme_email
          title: Let's Encrypt Email
          type: text
          help_text: "Email address for Let's Encrypt registration and renewal notifications"
          when: '{{repl or (ConfigOptionEquals "tls_mode" "lets_encrypt") (ConfigOptionEquals "tls_mode" "lets_encrypt_dns01")}}'
          required: true
          validation:
            regex:
              pattern: '^[^@\s]+@[^@\s]+\.[^@\s]+'
              message: "Must be a valid email address"
        - name: route53_hosted_zone_id
          title: Route 53 Hosted Zone ID
          help_text: "The Route 53 Hosted Zone ID for your domain (e.g. Z0123456789ABC). Found in the Route 53 console under Hosted zones."
          type: text
          when: '{{repl ConfigOptionEquals "tls_mode" "lets_encrypt_dns01"}}'
          required: true
        - name: route53_access_key_id
          title: AWS Access Key ID
          help_text: "IAM access key ID. The IAM user needs route53:ChangeResourceRecordSets, route53:ListResourceRecordSets, and route53:GetChange permissions on the hosted zone."
          type: text
          when: '{{repl ConfigOptionEquals "tls_mode" "lets_encrypt_dns01"}}'
          required: true
        - name: route53_secret_access_key
          title: AWS Secret Access Key
          help_text: "IAM secret access key corresponding to the access key ID above."
          type: password
          when: '{{repl ConfigOptionEquals "tls_mode" "lets_encrypt_dns01"}}'
          required: true
        - name: tls_cert
          title: TLS Certificate (PEM)
          type: file
          help_text: "PEM-encoded TLS certificate"
          when: '{{repl ConfigOptionEquals "tls_mode" "manual"}}'
        - name: tls_key
          title: TLS Private Key (PEM)
          type: file
          help_text: "PEM-encoded TLS private key"
          when: '{{repl ConfigOptionEquals "tls_mode" "manual"}}'

    - name: secrets
      title: Secrets
      items:
        - name: nextauth_secret
          title: NextAuth Secret
          help_text: "A random string used to sign and encrypt NextAuth session tokens. A secure 32-character value is generated automatically; only override if you need to share sessions across multiple installs."
          type: password
          hidden: true
          readonly: false
          value: '{{repl RandomString 32}}'

    - name: ai_commentary
      title: AI Commentary
      when: '{{repl LicenseFieldValue "ai_commentary_enabled"}}'
      items:
        - name: ai_provider
          title: AI Provider
          type: select_one
          default: openai
          items:
            - name: openai
              title: OpenAI (GPT-4o)
            - name: anthropic
              title: Anthropic (Claude Haiku)

        - name: openai_api_key
          title: OpenAI API Key
          type: password
          when: '{{repl ConfigOptionEquals "ai_provider" "openai"}}'

        - name: anthropic_api_key
          title: Anthropic API Key
          type: password
          when: '{{repl ConfigOptionEquals "ai_provider" "anthropic"}}'
