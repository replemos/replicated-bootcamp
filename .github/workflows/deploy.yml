name: Deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    uses: ./.github/workflows/docker-publish.yml
    with:
      tag: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'main' }}
    secrets: inherit

  release:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - name: Set version and channel
        id: vars
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            IMAGE_TAG="${{ github.ref_name }}"
            VERSION="${IMAGE_TAG#v}"
            CHANNEL="Stable"
          else
            CALVER=$(date -u +"%Y.%-m.%-d")
            VERSION="${CALVER}-main.${{ github.run_number }}"
            IMAGE_TAG="main"
            CHANNEL="Unstable"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT

      - name: Package Helm chart
        run: |
          sed -i "s/^  tag: .*/  tag: ${{ steps.vars.outputs.image-tag }}/" deploy/charts/values.yaml
          sed -i "s/chartVersion: .*/chartVersion: ${{ steps.vars.outputs.version }}/" deploy/manifests/helmchart.yaml
          helm package deploy/charts -d deploy/manifests --version "${{ steps.vars.outputs.version }}"
          helm repo add traefik https://helm.traefik.io/traefik
          helm pull traefik/traefik --version 39.0.7 -d deploy/manifests
          helm repo add jetstack https://charts.jetstack.io
          helm pull jetstack/cert-manager --version v1.17.2 -d deploy/manifests

      - name: Create and promote Replicated release
        uses: replicatedhq/replicated-actions/create-release@v1
        with:
          app-slug: playball-exe
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          yaml-dir: deploy/manifests
          promote-channel: ${{ steps.vars.outputs.channel }}
          version: ${{ steps.vars.outputs.version }}
